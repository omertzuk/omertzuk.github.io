project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!posts/drafts/**/*.qmd"
  resources:
    - "_redirects"

execute:
  freeze: true

website:
  title: "Omer Tzuk"
  site-url: https://omertzuk.github.io/
  description: "Omer Tzuk's Website"
  open-graph: true

  repo-url: https://github.com/omertzuk/omertzuk.github.io
  repo-actions: [edit, issue]

  navbar:
    right:
      - research.qmd
      - text: Publications
        href: publications.qmd
      - sidebar:garden
      - text: CV
        href: CV.qmd
      - icon: github
        href: https://github.com/omertzuk
      - icon: linkedin
        href: https://www.linkedin.com/in/omertzuk/
      # - icon: twitter
      #   href: https://twitter.com/cynthiahqy
      # - icon: envelope-at-fill
      #   href: mailto:cynthia.huang@monash.edu
      - icon: rss
        href: blog.xml

  sidebar:
    - id: gallery
      title: "Gallery"
      contents:
        - gallery.qmd
        - gallery/sketchbook/index.qmd
        - gallery/podcasts.qmd
    
    - id: garden
      title: "Digital Garden"
      contents:
        - text: "Welcome"
          href: digital-garden.qmd
        - garden/information-theory/index.qmd
        - garden/complex-systems/index.qmd
        - garden/consciousness/index.qmd
        - garden/ecology/index.qmd

  page-footer:
    right: "This website is built with ❤️  and [Quarto](https://quarto.org/), by Omer Tzuk. License: [CC BY-SA 4.0](https://creativecommons.org/licenses/by-sa/4.0/)."

format:
  html:
    theme: simplex
    css: styles.css
    from: markdown+emoji
